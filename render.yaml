databases:
  - name: amiontrack-db
    plan: free
    databaseName: amiontrack
    user: amiontrack

services:
  # Backend — FastAPI
  - type: web
    name: amiontrack-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: amiontrack-db
          property: connectionString
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: ALLOWED_ORIGINS
        value: https://amiontrack.onrender.com
      - key: PYTHON_VERSION
        value: "3.12.0"

  # Frontend — React static site
  - type: web
    name: amiontrack
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /api/*
        destination: https://amiontrack-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
